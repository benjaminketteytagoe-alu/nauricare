services:
  postgres:
    image: postgres:15-alpine
    container_name: nauricare_db
    environment:
      POSTGRES_USER: nauricare_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: nauricare
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
